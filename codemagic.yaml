workflows:
  ios-unsigned:
    name: Expo iOS Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install

      - name: Generate iOS folder from Expo
        script: |
          npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Find workspace and scheme
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

      - name: Build iOS app without signing
        script: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned IPA
        script: |
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug-iphoneos/*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r unsigned-ios-app.ipa Payload

    artifacts:
      - unsigned-ios-app.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log
